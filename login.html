<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* Background */
body {
  background: linear-gradient(135deg, #eef5ff, #f8fbff);
  min-height: 100vh;
  padding-top: 80px;
}

/* Card */
.login-card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border-radius: 28px;
  padding: 40px;
  width: 100%;
  max-width: 600px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  border: 1px solid rgba(255,255,255,0.4);
  text-align: center;
}

/* Logo */
.brand-logo {
  font-size: 1.8rem;
  font-weight: 800;
  color: #1769ff;
  margin-bottom: 10px;
}

/* Inputs */
.form-control {
  border-radius: 14px;
  padding: 12px;
  border: 1px solid #dbe3ee;
  box-shadow: 0 4px 12px rgba(15,23,42,0.04);
}

.form-control:focus {
  border-color: #1769ff;
  box-shadow: 0 0 0 2px rgba(23,105,255,0.1);
}

/* Button */
.btn-primary {
  border-radius: 14px;
  padding: 10px;
  font-weight: 600;
}

/* Divider */
.divider {
  margin: 20px 0;
  font-size: 0.85rem;
  color: #6b7280;
}

/* Footer */
.footer-text {
  font-size: 0.9rem;
}

.footer-text a {
  text-decoration: none;
  font-weight: 600;
}

</style>

</head>

<body>
    <div class="container-fluid vh-100">
  <div class="row h-100">

    <!-- LEFT SIDE -->
    <div class="col-md-7 d-none d-md-flex flex-column justify-content-center px-5"
         style="background: linear-gradient(135deg, #eef5ff, #dbeafe);">

      <h1 class="fw-bold display-4">
        Welcome to <span style="color:#1769ff;">CampusStore</span>
      </h1>

      <p class="text-muted mt-3 fs-5">
        Shop smarter for your campus life.  
        Everything you need in one place.
      </p>

    </div>
<div class="col-md-5"></div>
  </div>
  <div class="login-card position-absolute top-50 start-50 translate-middle-y"
       style="margin-left: -120px;">

  <div class="login-card">
  <!-- Logo -->
  <div class="brand-logo">CampusStore</div>

  <h4 class="fw-bold mb-3">Welcome Back 👋</h4>

  <p class="text-muted mb-4">
    Login to continue your shopping journey
  </p>

  <!-- Form -->
  <form action="backend/login.php" method="POST">
    
    <input type="hidden" name="redirect" id="redirectInput">

    <input class="form-control mb-3" name="email" placeholder="Email" required>

    <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>

    <button class="btn btn-primary w-100">
      Login
    </button>

  </form>

  <!-- Divider -->
  <div class="divider">or</div>

  

  <!-- Footer -->
  <p class="footer-text mt-3">
    New user? <a href="signup.html">Create account</a>
  </p>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const redirect = params.get("redirect");

if (redirect) {
    document.getElementById("redirectInput").value = redirect;
}
</script>

</body>
</html>
