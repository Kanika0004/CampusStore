<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5" style="max-width:400px">

<h3 class="text-center">Login</h3>

<form action="backend/login.php" method="POST">
<input type="hidden" name="redirect" id="redirectInput">
<input class="form-control mb-3" name="email" placeholder="Email">

<input class="form-control mb-3" name="password" type="password" placeholder="Password">

<button class="btn btn-primary w-100">Login</button>

</form>

<p class="text-center mt-3">
New user? <a href="signup.html">Create account</a>
</p>

</div>

</body>
<script>
const params = new URLSearchParams(window.location.search);
const redirect = params.get("redirect");

if (redirect) {
    document.getElementById("redirectInput").value = redirect;
}
</script>
</html>
