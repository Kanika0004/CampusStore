<!DOCTYPE html>
<html>
<head>
<title>Contact Support</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}

.contact-wrapper{
max-width:550px;
margin:80px auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

h2{
font-weight:700;
margin-bottom:25px;
text-align:center;
}

</style>

</head>

<body>

<div class="contact-wrapper">

<h2>Contact Support</h2>

<div id="alertBox"></div>

<div class="mb-3">
<label class="form-label">Name</label>
<input id="name" class="form-control" placeholder="Your Name">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input id="email" class="form-control" placeholder="Your Email">
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea id="message" class="form-control" rows="4" placeholder="Write your message"></textarea>
</div>

<button id="sendBtn" class="btn btn-primary w-100" onclick="sendEnquiry()">
Send Message
</button>

</div>


<script>

function showAlert(type,message){

document.getElementById("alertBox").innerHTML=`
<div class="alert alert-${type} alert-dismissible fade show" role="alert">
${message}
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
`;

}


function sendEnquiry(){

let name=document.getElementById("name").value.trim()
let email=document.getElementById("email").value.trim()
let message=document.getElementById("message").value.trim()

if(name==="" || email==="" || message===""){
showAlert("danger","Please fill all fields")
return
}

let btn=document.getElementById("sendBtn")
btn.innerText="Sending..."
btn.disabled=true


fetch("backend/send_enquiry.php",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:`name=${name}&email=${email}&message=${message}`

})

.then(res=>res.json())

.then(data=>{

btn.innerText="Send Message"
btn.disabled=false

if(data.status==="success"){

showAlert("success","Message sent successfully!")

document.getElementById("name").value=""
document.getElementById("email").value=""
document.getElementById("message").value=""

}else{

showAlert("danger","Something went wrong")

}

})

.catch(()=>{

btn.innerText="Send Message"
btn.disabled=false

showAlert("danger","Server error")

})

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
