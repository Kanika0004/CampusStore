<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Wishlist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      .product-card {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .product-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      }

      .qty-box {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .qty-value {
        min-width: 28px;
        text-align: center;
        font-weight: 600;
      }

      .wishlist-btn {
        width: 36px;
        height: 36px;
        min-width: 36px;
        min-height: 36px;
        padding: 0;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        border: none;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      }

      .wishlist-btn i {
        font-size: 14px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .wishlist-btn.active i {
        color: #dc3545;
      }
    </style>
  </head>

  <body>
    <div class="container py-5">
      <h2 class="fw-bold mb-4">My Wishlist</h2>
      <div class="row g-4" id="wishlistContainer"></div>
    </div>

    <script>
      function renderWishlistCard(product) {
        return `
        <div class="col-12 col-sm-6 col-lg-3">
          <div class="card h-100 shadow-sm product-card">
            <div class="ratio ratio-4x3 bg-light">
              <img
                src="./public/${product.image}"
                class="w-100 h-100 object-fit-contain p-3"
                alt="${product.name}"
              />
            </div>

            <div class="card-body d-flex flex-column">
              <div class="d-flex justify-content-between">
                <div>
                  <h5 class="card-title mb-1">${product.name}</h5>
                  ${product.category ? `<p class="text-muted small mb-1">${product.category}</p>` : ""}
                  ${product.subcategory ? `<p class="text-muted small mb-2">${product.subcategory}</p>` : ""}
                </div>

                <button type="button" class="wishlist-btn active remove-wishlist-btn" data-id="${product.id}">
  <i class="bi bi-heart-fill"></i>
</button>
              </div>

              <div class="mb-3">
                <span class="fw-bold fs-5">₹${product.price}</span>
              </div>

              <div class="mt-auto">
                <a href="index.html" class="btn btn-primary w-100">Continue Shopping</a>
              </div>
            </div>
          </div>
        </div>
      `;
      }

      function attachWishlistRemoveEvents() {
        document.querySelectorAll(".remove-wishlist-btn").forEach((btn) => {
          btn.addEventListener("click", function () {
            const productId = this.dataset.id;

            fetch("backend/add_to_wishlist.php", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                product_id: productId,
              }),
            })
              .then((res) => res.json())
              .then((data) => {
                if (data.status === "removed") {
                  loadWishlist();
                }
              })
              .catch((err) => console.error("Remove wishlist error:", err));
          });
        });
      }

      function loadWishlist() {
        fetch("backend/get_wishlist.php")
          .then((res) => res.json())
          .then((products) => {
            const container = document.getElementById("wishlistContainer");
            container.innerHTML = "";

            if (!Array.isArray(products) || products.length === 0) {
              container.innerHTML = `<p class="text-muted">No items in wishlist.</p>`;
              return;
            }

            products.forEach((product) => {
              container.innerHTML += renderWishlistCard(product);
            });

            attachWishlistRemoveEvents();
          })
          .catch((err) => console.error("Wishlist load error:", err));
      }

      loadWishlist();
    </script>
  </body>
</html>
