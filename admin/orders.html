<h2 class="mb-4 fw-bold">Orders</h2>

<div class="card shadow-sm p-3">

<!-- SEARCH BAR -->

<input type="text" id="searchOrders" class="form-control mb-3"
placeholder="Search orders..." onkeyup="searchOrders()">


<table class="table table-striped">

<thead>
<tr>
<th>ID</th>
<th>User</th>
<th>Total</th>
<th>Payment</th>
<th>Status</th>
<th>Date</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>

</table>

</div>


<!-- ORDER DETAILS MODAL -->

<div class="modal fade" id="orderModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>Order Details</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body" id="orderDetails"></div>

</div>

</div>

</div>
