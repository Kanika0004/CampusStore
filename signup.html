<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* Background */
body {
  background: linear-gradient(135deg, #eef5ff, #f8fbff);
  min-height: 100vh;
}

/* Card */
.signup-card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  border-radius: 28px;
  padding: 40px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

/* Logo */
.brand-logo {
  font-size: 1.8rem;
  font-weight: 800;
  color: #1769ff;
}

/* Inputs */
.form-control {
  border-radius: 14px;
  padding: 12px;
  border: 1px solid #dbe3ee;
}

.form-control:focus {
  border-color: #1769ff;
  box-shadow: 0 0 0 2px rgba(23,105,255,0.1);
}

/* Button */
.btn-success {
  border-radius: 14px;
  padding: 10px;
  font-weight: 600;
}

/* Feature list */
.feature {
  display: flex;
  align-items: center;
  margin-bottom: 15px;
}

.feature i {
  color: #1769ff;
  font-size: 1.2rem;
  margin-right: 10px;
}

</style>

</head>

<body>

<div class="container-fluid vh-100">
  <div class="row h-100">

    <!-- LEFT: SIGNUP FORM -->
    <div class="col-md-6 d-flex justify-content-center align-items-center">

      <div class="signup-card">

        <div class="brand-logo mb-2">CampusStore</div>

        <h4 class="fw-bold mb-2">Create Account 🚀</h4>

        <p class="text-muted mb-4">
          Join and start your smarter campus shopping
        </p>

        <form action="backend/signup.php" method="POST">

          <input class="form-control mb-3" name="name" placeholder="Full Name" required>

          <input class="form-control mb-3" name="email" type="email" placeholder="Email" required>

          <div class="position-relative">
            <input id="password" class="form-control mb-3 pe-5" name="password" type="password" placeholder="Password" required>
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3"
               style="cursor:pointer;"
               onclick="togglePassword()"></i>
          </div>

          <button class="btn btn-success w-100">
            Create Account
          </button>

        </form>

        <p class="text-center mt-3">
          Already have an account? <a href="login.html">Login</a>
        </p>

      </div>

    </div>

    <!-- RIGHT: BENEFITS -->
    <div class="col-md-6 d-none d-md-flex flex-column justify-content-center px-5"
         style="background: linear-gradient(135deg, #dbeafe, #eef5ff);">

      <h2 class="fw-bold mb-4">
        Why join <span style="color:#1769ff;">CampusStore?</span>
      </h2>

      <div class="feature">
        <i class="bi bi-lightning-charge-fill"></i>
        Fast and seamless checkout
      </div>

      <div class="feature">
        <i class="bi bi-heart-fill"></i>
        Save items to wishlist
      </div>

      <div class="feature">
        <i class="bi bi-box-seam"></i>
        Track all your orders easily
      </div>

      <div class="feature">
        <i class="bi bi-stars"></i>
        Curated products for students
      </div>

    </div>

  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
