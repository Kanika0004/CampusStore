<!DOCTYPE html>
<html>
<head>
<title>Admin Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f8f9fa;
font-family:system-ui,-apple-system,"Segoe UI",Roboto;
}

.settings-container{
max-width:900px;
margin:60px auto;
}

.settings-card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:25px;
}
</style>

</head>

<body>

<div class="settings-container">

<h2 class="fw-bold mb-4">Admin Settings</h2>

<!-- SUCCESS MESSAGE -->
<div id="successMsg" class="alert alert-success d-none"></div>

<!-- ADMIN PROFILE -->
<div class="settings-card">

<h5 class="mb-3">Admin Profile</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input id="adminName" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input id="adminEmail" class="form-control">
</div>

</div>

<button class="btn btn-primary" onclick="updateProfile()">
Update Profile
</button>

</div>

<!-- WEBSITE SETTINGS -->
<div class="settings-card">

<h5 class="mb-3">Website Settings</h5>

<div class="mb-3">
<label>Website Name</label>
<input id="siteName" class="form-control">
</div>

<div class="mb-3">
<label>Support Email</label>
<input id="supportEmail" class="form-control">
</div>

<div class="mb-3">
<label>Contact Phone</label>
<input id="contactPhone" class="form-control">
</div>

<button class="btn btn-primary" onclick="saveWebsiteSettings()">
Save Website Settings
</button>

</div>

<!-- PAYMENT SETTINGS -->
<div class="settings-card">

<h5 class="mb-3">Payment Settings</h5>

<div class="mb-3">
<label>Enable Cash on Delivery</label>
<select id="cod" class="form-control">
<option value="Enabled">Enabled</option>
<option value="Disabled">Disabled</option>
</select>
</div>

<div class="mb-3">
<label>UPI ID</label>
<input id="upi" class="form-control" placeholder="campusstore@upi">
</div>

<div class="mb-3">
<label>Payment Gateway</label>
<select id="gateway" class="form-control">
<option>Razorpay</option>
<option>Stripe</option>
<option>PayPal</option>
</select>
</div>

<button class="btn btn-primary" onclick="savePaymentSettings()">
Save Payment Settings
</button>

</div>

<!-- SECURITY -->
<div class="settings-card">

<h5 class="mb-3">Security</h5>

<div class="mb-3">
<label>Change Password</label>
loadAdminProfile()
setTimeout(()=>{
    loadWebsiteSettings()
    loadPaymentSettings()
},150)</div>

<button class="btn btn-danger" onclick="changePassword()">
Change Password
</button>

</div>

</div>

<!-- IMPORTANT: LOAD MAIN JS -->
<script src="/CampusStore/admin/admin.js"></script>

</body>
</html>
