<body>

<div class="settings-container">

<h2 class="fw-bold mb-4">Admin Settings</h2>

<!-- ADMIN PROFILE -->

<div class="settings-card">

<h5 class="mb-3">Admin Profile</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input id="adminName" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input id="adminEmail" class="form-control">
</div>

</div>

<button class="btn btn-primary">Update Profile</button>

</div>


<!-- WEBSITE SETTINGS -->

<div class="settings-card">

<h5 class="mb-3">Website Settings</h5>

<div class="mb-3">
<label>Website Name</label>
<input class="form-control" value="CampusStore">
</div>

<div class="mb-3">
<label>Support Email</label>
<input class="form-control" value="support@campusstore.com">
</div>

<div class="mb-3">
<label>Contact Phone</label>
<input class="form-control">
</div>

<button class="btn btn-primary">Save Website Settings</button>

</div>


<!-- PAYMENT SETTINGS -->

<div class="settings-card">

<h5 class="mb-3">Payment Settings</h5>

<div class="mb-3">
<label>Enable Cash on Delivery</label>
<select class="form-control">
<option>Enabled</option>
<option>Disabled</option>
</select>
</div>

<div class="mb-3">
<label>UPI ID</label>
<input class="form-control" placeholder="campusstore@upi">
</div>

<div class="mb-3">
<label>Payment Gateway</label>
<select class="form-control">
<option>Razorpay</option>
<option>Stripe</option>
<option>PayPal</option>
</select>
</div>

<button class="btn btn-primary">Save Payment Settings</button>

</div>


<!-- SECURITY -->

<div class="settings-card">

<h5 class="mb-3">Security</h5>

<div class="mb-3">
<label>Change Password</label>
<input type="password" id="password" class="form-control">
</div>

<button class="btn btn-danger" onclick="updatePassword()">
Change Password
</button>

</div>

</div>


<script>

function updatePassword(){

let password=document.getElementById("password").value

fetch("backend/update_admin_password.php",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:`password=${password}`

})
.then(res=>res.json())
.then(data=>{

if(data.status==="success"){
alert("Password updated successfully")
}

})

}

</script>

</body>
</html>
