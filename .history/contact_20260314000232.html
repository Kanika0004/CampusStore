<!DOCTYPE html>
<html>
<head>
<title>Contact Support</title>

<style>

body{
font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
background:#f8f9fa;
margin:0;
padding:0;
}

/* Center the form */
.contact-wrapper{
max-width:500px;
margin:80px auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:25px;
font-weight:700;
}

input, textarea{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
margin-bottom:15px;
font-size:14px;
}

textarea{
min-height:120px;
resize:none;
}

button{
width:100%;
background:#0d6efd;
color:white;
border:none;
padding:10px;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#0b5ed7;
}

</style>

</head>

<body>

<div class="contact-wrapper">

<h2>Contact Support</h2>

<input id="name" placeholder="Your Name">
<input id="email" placeholder="Your Email">

<textarea id="message" placeholder="Your message"></textarea>

<button onclick="sendEnquiry()">Send Message</button>

</div>

<script>

function sendEnquiry(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let message=document.getElementById("message").value

fetch("backend/send_enquiry.php",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:`name=${name}&email=${email}&message=${message}`

})

.then(res=>res.json())
.then(data=>{

if(data.status==="success"){
alert("Message sent!")
}

})

}

</script>

</body>
</html>
